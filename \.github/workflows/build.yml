name: Build Akuma SMP APK

on:
  workflow_dispatch: # Yeh aapko manual Play button dega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Setup Android Project Structure
        run: |
          # Folders ban banana
          mkdir -p app/src/main/java/com/akuma/stream
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Aapki files ko unke sahi kamro mein bhejna
          mv MainActivity.kt app/src/main/java/com/akuma/stream/ 2>/dev/null || true
          mv StreamingService.kt app/src/main/java/com/akuma/stream/ 2>/dev/null || true
          mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
          mv activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
          mv build.gradle app/ 2>/dev/null || true
          
          # Root settings
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.1.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF
          
          # Missing resources (taaki error na aaye)
          echo '<resources><string name="app_name">Akuma Stream</string></resources>' > app/src/main/res/values/strings.xml
          echo '<resources><color name="black">#FF000000</color><color name="white">#FFFFFFFF</color></resources>' > app/src/main/res/values/colors.xml
          echo '<resources><style name="Theme.AkumaStream" parent="android:Theme.Material.Light.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml

      - name: 🚀 Build the APK
        run: |
          gradle wrapper
          ./gradlew assembleDebug

      - name: 📦 Upload APK file
        uses: actions/upload-artifact@v4
        with:
          name: AkumaStream-App
          path: app/build/outputs/apk/debug/*.apk
          
